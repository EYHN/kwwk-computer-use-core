name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Swift tests
    runs-on: macos-15

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Build and test
        run: swift test --explicit-target-dependency-import-check error

      - name: Build release
        run: swift build -c release --explicit-target-dependency-import-check error
